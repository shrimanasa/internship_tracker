# Production Docker Compose overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  backend:
    command: ['uvicorn', 'app.main:app', '--host', '0.0.0.0', '--port', '8000', '--workers', '4']
    restart: always
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    command: ['npm', 'run', 'start']
    environment:
      - NODE_ENV=production
